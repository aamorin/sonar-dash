<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#00070a">
  <meta name="description" content="Sonar Dash: a mobile-first deep sea arcade game.">
  <title>Sonar Dash</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #dff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #game {
      width: 100vw;
      height: 100dvh;
      background: #000;
    }

    canvas {
      display: block;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
  <main id="game" aria-label="Sonar Dash game"></main>

  <script>
    (() => {
      const WORLD_WIDTH = 390;
      const WORLD_HEIGHT = 844;
      const PLAYER_X = 92;
      const GRAVITY = 285;
      const THRUST = -760;
      const THRUST_PULSE = -135;
      const SCROLL_SPEED = 170;
      const CHUNK_WIDTH = 132;
      const FADE_MS = 1500;
      const SONAR_SPEED = 920;
      const SONAR_MAX_RADIUS = 920;
      const SONAR_BAND = 46;
      const MINE_SPACING = 450;
      const WHALE_SPACING = 980;

      class SonarDash extends Phaser.Scene {
        constructor() {
          super("SonarDash");
          this.isGameOver = false;
          this.distance = 0;
          this.nextChunkX = 0;
          this.nextMineX = 0;
          this.nextWhaleX = 0;
          this.isThrusting = false;
          this.ripples = [];
          this.landChunks = [];
          this.mines = [];
          this.whales = [];
        }

        preload() {}

        create() {
          this.cameras.main.setBackgroundColor("#000000");
          this.physics.world.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
          this.physics.world.gravity.y = GRAVITY;

          this.landLayer = this.add.layer();
          this.mineLayer = this.add.layer();
          this.sonarLayer = this.add.layer();
          this.uiLayer = this.add.layer();

          this.createPlayer();
          this.createUi();
          this.input.on("pointerdown", this.handlePointer, this);
          this.input.on("pointerup", this.stopThrust, this);
          this.input.on("pointerout", this.stopThrust, this);

          this.nextChunkX = WORLD_WIDTH + 170;
          while (this.nextChunkX < WORLD_WIDTH + CHUNK_WIDTH * 2) {
            this.spawnRockFormation();
          }

          this.nextMineX = WORLD_WIDTH + 360;
          for (let i = 0; i < 3; i += 1) {
            this.spawnMine();
          }

          this.nextWhaleX = WORLD_WIDTH + 820;
          this.spawnWhale();

          this.emitSonar();
        }

        createPlayer() {
          this.player = this.add.container(PLAYER_X, WORLD_HEIGHT * 0.44);
          const hull = this.add.ellipse(0, 0, 58, 24, 0x072129, 1)
            .setStrokeStyle(2, 0x19f6ff, 0.95);
          const nose = this.add.triangle(29, 0, 0, -12, 0, 12, 18, 0, 0x0c323d, 1)
            .setStrokeStyle(1, 0x19f6ff, 0.9);
          const tail = this.add.triangle(-33, 0, 0, -11, 0, 11, -15, 0, 0x0c323d, 1)
            .setStrokeStyle(1, 0x19f6ff, 0.85);
          const port = this.add.circle(6, -1, 5, 0xbaff7a, 0.95);
          const fin = this.add.triangle(-4, -10, -13, -27, 8, -11, 0, 0x0a2c35, 1)
            .setStrokeStyle(1, 0x19f6ff, 0.7);

          this.player.add([tail, hull, nose, fin, port]);
          this.physics.add.existing(this.player);
          this.player.body.setSize(50, 20);
          this.player.body.setOffset(-25, -10);
          this.player.body.setAllowRotation(false);
          this.player.body.setCollideWorldBounds(false);
          this.player.body.setDragY(260);
          this.player.body.setMaxVelocity(0, 330);
        }

        createUi() {
          this.scoreText = this.add.text(18, 18, "0 m", {
            color: "#baff7a",
            fontSize: "24px",
            fontStyle: "700",
            stroke: "#001214",
            strokeThickness: 4
          }).setScrollFactor(0);

          this.hintText = this.add.text(WORLD_WIDTH / 2, WORLD_HEIGHT - 72, "Hold to rise", {
            color: "#7dfcff",
            fontSize: "18px",
            fontStyle: "700"
          }).setOrigin(0.5).setAlpha(0.82);

          this.uiLayer.add([this.scoreText, this.hintText]);
        }

        handlePointer() {
          if (this.isGameOver) {
            this.scene.restart();
            return;
          }

          this.isThrusting = true;
          this.player.body.setVelocityY(Phaser.Math.Clamp(this.player.body.velocity.y + THRUST_PULSE, -235, 120));
          this.tweens.add({
            targets: this.player,
            scaleY: 0.96,
            scaleX: 1.04,
            duration: 120,
            yoyo: true,
            ease: "Sine.easeInOut"
          });
          this.emitSonar();
          this.hintText.setVisible(false);
        }

        stopThrust() {
          this.isThrusting = false;
        }

        emitSonar() {
          const ring = this.add.circle(this.player.x, this.player.y, 8);
          ring.setStrokeStyle(2, 0x7dfcff, 0.95);
          ring.setFillStyle(0x000000, 0);
          ring.birth = this.time.now;
          ring.originX = this.player.x;
          ring.originY = this.player.y;
          ring.radiusNow = 8;
          this.sonarLayer.add(ring);
          this.ripples.push(ring);

          this.tweens.add({
            targets: ring,
            alpha: 0,
            duration: 1280,
            ease: "Quad.easeOut"
          });
        }

        spawnRockFormation() {
          const x = this.nextChunkX;
          const width = Phaser.Math.Between(92, 164);
          const skip = Phaser.Math.FloatBetween(0, 1) < 0.26;
          if (!skip) {
            const top = Phaser.Math.FloatBetween(0, 1) < 0.5;
            const depth = Phaser.Math.Between(135, 315);
            const teeth = Phaser.Math.Between(3, 5);
            const points = [];

            if (top) {
              points.push({ x, y: 0 }, { x: x + width, y: 0 });
              for (let i = teeth; i >= 0; i -= 1) {
                const px = x + (width * i) / teeth;
                const edge = depth + Phaser.Math.Between(-70, 42);
                const tooth = i % 2 === 0 ? edge + Phaser.Math.Between(36, 92) : edge;
                points.push({ x: px, y: Phaser.Math.Clamp(tooth, 84, 360) });
              }
              this.createLandPolygon(points, "top");
            } else {
              points.push({ x, y: WORLD_HEIGHT }, { x: x + width, y: WORLD_HEIGHT });
              for (let i = teeth; i >= 0; i -= 1) {
                const px = x + (width * i) / teeth;
                const edge = WORLD_HEIGHT - depth + Phaser.Math.Between(-42, 70);
                const tooth = i % 2 === 0 ? edge - Phaser.Math.Between(36, 96) : edge;
                points.push({ x: px, y: Phaser.Math.Clamp(tooth, WORLD_HEIGHT - 360, WORLD_HEIGHT - 86) });
              }
              this.createLandPolygon(points, "bottom");
            }
          }

          this.nextChunkX += CHUNK_WIDTH + Phaser.Math.Between(18, 92);
        }

        createLandPolygon(points, kind) {
          const graphics = this.add.graphics();
          graphics.fillStyle(0x0a3027, 1);
          graphics.lineStyle(2, 0x6aff8a, 0.9);
          graphics.beginPath();
          graphics.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i += 1) {
            graphics.lineTo(points[i].x, points[i].y);
          }
          graphics.closePath();
          graphics.fillPath();
          graphics.strokePath();
          graphics.setAlpha(0);

          const minX = Math.min(...points.map((p) => p.x));
          const maxX = Math.max(...points.map((p) => p.x));
          const minY = Math.min(...points.map((p) => p.y));
          const maxY = Math.max(...points.map((p) => p.y));
          const collider = this.add.zone(minX, minY, maxX - minX, maxY - minY).setOrigin(0);
          this.physics.add.existing(collider, true);
          this.physics.add.collider(this.player, collider, () => this.endGame());

          this.landLayer.add(graphics);
          const chunk = {
            graphics,
            collider,
            points,
            kind,
            revealAt: -FADE_MS,
            centerX: (minX + maxX) * 0.5,
            centerY: (minY + maxY) * 0.5,
            radius: Phaser.Math.Distance.Between(minX, minY, maxX, maxY) * 0.5
          };
          this.landChunks.push(chunk);
        }

        spawnMine() {
          const radius = Phaser.Math.Between(15, 22);
          const x = this.nextMineX;
          const y = Phaser.Math.Between(150, WORLD_HEIGHT - 150);
          const mine = this.add.container(x, y);
          const body = this.add.circle(0, 0, radius, 0x13302a, 1)
            .setStrokeStyle(2, 0xbaff7a, 0.95);
          const glow = this.add.circle(0, 0, radius + 7, 0x7dfcff, 0.08);

          for (let i = 0; i < 8; i += 1) {
            const angle = (Math.PI * 2 * i) / 8;
            const sx = Math.cos(angle) * (radius + 2);
            const sy = Math.sin(angle) * (radius + 2);
            mine.add(this.add.circle(sx, sy, 3, 0xbaff7a, 0.98));
          }

          mine.add([glow, body]);
          mine.setAlpha(0);
          mine.revealAt = -FADE_MS;
          mine.radius = radius + 11;
          this.mineLayer.add(mine);

          this.physics.add.existing(mine);
          mine.body.setCircle(radius);
          mine.body.setOffset(-radius, -radius);
          mine.body.setAllowGravity(false);
          mine.body.setImmovable(true);
          this.physics.add.overlap(this.player, mine, () => this.endGame());

          this.mines.push(mine);
          this.nextMineX += MINE_SPACING + Phaser.Math.Between(-70, 150);
        }

        spawnWhale() {
          const x = this.nextWhaleX;
          const y = Phaser.Math.Between(190, WORLD_HEIGHT - 190);
          const whale = this.add.container(x, y);
          const body = this.add.ellipse(0, 0, 132, 44, 0x071b24, 1)
            .setStrokeStyle(2, 0x7dfcff, 0.95);
          const head = this.add.ellipse(42, -2, 54, 38, 0x092431, 1)
            .setStrokeStyle(1, 0x7dfcff, 0.8);
          const tailTop = this.add.triangle(-72, -7, 0, 0, -34, -27, -28, -3, 0x071b24, 1)
            .setStrokeStyle(1, 0x7dfcff, 0.8);
          const tailBottom = this.add.triangle(-72, 7, 0, 0, -34, 27, -28, 3, 0x071b24, 1)
            .setStrokeStyle(1, 0x7dfcff, 0.8);
          const fin = this.add.triangle(-8, 14, 0, 0, 34, 8, 5, 25, 0x0b3540, 1)
            .setStrokeStyle(1, 0xbaff7a, 0.75);
          const eye = this.add.circle(60, -7, 3, 0xbaff7a, 1);
          const glow = this.add.ellipse(0, 0, 154, 62, 0x7dfcff, 0.06);

          whale.add([glow, tailTop, tailBottom, body, head, fin, eye]);
          whale.setAlpha(0);
          whale.revealAt = -FADE_MS;
          whale.radius = 88;
          whale.baseY = y;
          whale.phase = Phaser.Math.FloatBetween(0, Math.PI * 2);
          whale.sway = Phaser.Math.Between(18, 34);
          this.mineLayer.add(whale);

          this.physics.add.existing(whale);
          whale.body.setSize(118, 38);
          whale.body.setOffset(-59, -19);
          whale.body.setAllowGravity(false);
          whale.body.setImmovable(true);
          this.physics.add.overlap(this.player, whale, () => this.endGame());

          this.whales.push(whale);
          this.nextWhaleX += WHALE_SPACING + Phaser.Math.Between(-110, 240);
        }

        update(_, delta) {
          if (this.isGameOver) return;

          const dt = delta / 1000;
          const dx = SCROLL_SPEED * dt;
          this.distance += dx * 0.18;
          this.scoreText.setText(`${Math.floor(this.distance)} m`);

          if (this.isThrusting) {
            this.player.body.velocity.y += THRUST * dt;
          }

          this.player.body.velocity.y = Phaser.Math.Clamp(this.player.body.velocity.y, -265, 315);
          this.player.rotation = Phaser.Math.Clamp(this.player.body.velocity.y / 950, -0.22, 0.36);
          if (this.player.y < 42) {
            this.player.y = 42;
            this.player.body.setVelocityY(80);
          } else if (this.player.y > WORLD_HEIGHT - 42) {
            this.player.y = WORLD_HEIGHT - 42;
            this.player.body.setVelocityY(-80);
          }

          this.scrollWorld(dx);
          this.updateRipples(delta);
          this.updateReveals();
        }

        scrollWorld(dx) {
          this.nextChunkX -= dx;
          this.landChunks.forEach((chunk) => {
            chunk.graphics.x -= dx;
            chunk.collider.x -= dx;
            chunk.collider.body.updateFromGameObject();
            chunk.centerX -= dx;
          });

          while (this.landChunks.length && this.landChunks[0].centerX < -CHUNK_WIDTH) {
            const stale = this.landChunks.shift();
            stale.graphics.destroy();
            stale.collider.destroy();
          }

          while (this.nextChunkX < WORLD_WIDTH + CHUNK_WIDTH * 2) {
            this.spawnRockFormation();
          }

          this.nextMineX -= dx;
          this.mines.forEach((mine) => {
            mine.x -= dx;
          });

          while (this.mines.length && this.mines[0].x < -80) {
            this.mines.shift().destroy();
          }

          while (this.nextMineX < WORLD_WIDTH + 360) {
            this.spawnMine();
          }

          this.nextWhaleX -= dx;
          this.whales.forEach((whale) => {
            whale.x -= dx;
            whale.phase += 0.012;
            whale.y = whale.baseY + Math.sin(whale.phase) * whale.sway;
            whale.body.updateFromGameObject();
          });

          while (this.whales.length && this.whales[0].x < -140) {
            this.whales.shift().destroy();
          }

          while (this.nextWhaleX < WORLD_WIDTH + 700) {
            this.spawnWhale();
          }
        }

        updateRipples(delta) {
          for (let i = this.ripples.length - 1; i >= 0; i -= 1) {
            const ring = this.ripples[i];
            ring.x -= SCROLL_SPEED * (delta / 1000);
            ring.originX -= SCROLL_SPEED * (delta / 1000);
            const age = this.time.now - ring.birth;
            const radius = 8 + (age / 1000) * SONAR_SPEED;
            ring.radius = radius;
            ring.radiusNow = radius;

            if (radius > SONAR_MAX_RADIUS || ring.alpha <= 0.02) {
              ring.destroy();
              this.ripples.splice(i, 1);
              continue;
            }

            this.revealTouchedBy(ring);
          }
        }

        revealTouchedBy(ring) {
          const now = this.time.now;
          this.landChunks.forEach((chunk) => {
            const d = Phaser.Math.Distance.Between(ring.originX, ring.originY, chunk.centerX, chunk.centerY);
            if (Math.abs(d - ring.radiusNow) < chunk.radius + SONAR_BAND) {
              chunk.revealAt = now;
            }
          });

          this.mines.forEach((mine) => {
            const d = Phaser.Math.Distance.Between(ring.originX, ring.originY, mine.x, mine.y);
            if (Math.abs(d - ring.radiusNow) < mine.radius + SONAR_BAND) {
              mine.revealAt = now;
            }
          });

          this.whales.forEach((whale) => {
            const d = Phaser.Math.Distance.Between(ring.originX, ring.originY, whale.x, whale.y);
            if (Math.abs(d - ring.radiusNow) < whale.radius + SONAR_BAND) {
              whale.revealAt = now;
            }
          });
        }

        updateReveals() {
          const now = this.time.now;
          this.landChunks.forEach((chunk) => {
            const age = now - chunk.revealAt;
            const alpha = Phaser.Math.Clamp(1 - age / FADE_MS, 0, 0.92);
            chunk.graphics.setAlpha(alpha);
          });

          this.mines.forEach((mine) => {
            const age = now - mine.revealAt;
            const alpha = Phaser.Math.Clamp(1 - age / FADE_MS, 0, 1);
            mine.setAlpha(alpha);
          });

          this.whales.forEach((whale) => {
            const age = now - whale.revealAt;
            const alpha = Phaser.Math.Clamp(1 - age / FADE_MS, 0, 0.94);
            whale.setAlpha(alpha);
          });
        }

        endGame() {
          if (this.isGameOver) return;
          this.isGameOver = true;
          this.physics.pause();
          this.player.list.forEach((part) => {
            if (part.setTint) part.setTint(0xff4665);
          });
          this.player.rotation = 0.2;

          const veil = this.add.rectangle(0, 0, WORLD_WIDTH, WORLD_HEIGHT, 0x000000, 0.72).setOrigin(0);
          const title = this.add.text(WORLD_WIDTH / 2, WORLD_HEIGHT * 0.36, "Game Over", {
            color: "#7dfcff",
            fontSize: "44px",
            fontStyle: "900",
            stroke: "#001214",
            strokeThickness: 6
          }).setOrigin(0.5);
          const score = this.add.text(WORLD_WIDTH / 2, WORLD_HEIGHT * 0.45, `${Math.floor(this.distance)} m`, {
            color: "#baff7a",
            fontSize: "30px",
            fontStyle: "800"
          }).setOrigin(0.5);
          const button = this.add.rectangle(WORLD_WIDTH / 2, WORLD_HEIGHT * 0.56, 210, 54, 0x092d32, 1)
            .setStrokeStyle(2, 0x7dfcff, 1);
          const restart = this.add.text(WORLD_WIDTH / 2, WORLD_HEIGHT * 0.56, "Tap to Restart", {
            color: "#eaffff",
            fontSize: "20px",
            fontStyle: "800"
          }).setOrigin(0.5);

          this.uiLayer.add([veil, title, score, button, restart]);
        }
      }

      const game = new Phaser.Game({
        type: Phaser.AUTO,
        parent: "game",
        backgroundColor: "#000000",
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
          width: WORLD_WIDTH,
          height: WORLD_HEIGHT
        },
        physics: {
          default: "arcade",
          arcade: {
            gravity: { y: GRAVITY },
            debug: false
          }
        },
        render: {
          antialias: true,
          pixelArt: false
        },
        scene: SonarDash
      });

      window.addEventListener("resize", () => game.scale.refresh());

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }
    })();
  </script>
</body>
</html>
