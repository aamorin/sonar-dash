<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#00070a">
  <meta name="description" content="Sonar Dash: a mobile-first deep sea arcade game.">
  <title>Sonar Dash</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #dff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #game {
      width: 100vw;
      height: 100dvh;
      background: #000;
    }

    canvas {
      display: block;
    }
  </style>
  <script src="./phaser.min.js"></script>
</head>
<body>
  <main id="game" aria-label="Sonar Dash game"></main>

  <script>
    (() => {
      const IS_LANDSCAPE = window.innerWidth >= window.innerHeight;
      const WORLD_WIDTH = IS_LANDSCAPE ? 844 : 390;
      const WORLD_HEIGHT = IS_LANDSCAPE ? 390 : 844;
      const PLAYER_X = IS_LANDSCAPE ? 132 : 92;
      const GRAVITY = 285;
      const THRUST = -760;
      const THRUST_PULSE = -135;
      const SCROLL_SPEED = IS_LANDSCAPE ? 205 : 170;
      const CHUNK_WIDTH = IS_LANDSCAPE ? 150 : 132;
      const FADE_MS = 1500;
      const SONAR_SPEED = 920;
      const SONAR_MAX_RADIUS = Math.max(WORLD_WIDTH, WORLD_HEIGHT) * 1.15;
      const SONAR_BAND = 46;
      const MINE_SPACING = IS_LANDSCAPE ? 560 : 450;
      const WHALE_SPACING = IS_LANDSCAPE ? 1520 : 1240;
      const ROCK_MIN_DEPTH = IS_LANDSCAPE ? 58 : 135;
      const ROCK_MAX_DEPTH = IS_LANDSCAPE ? 148 : 315;
      const ROCK_EDGE_JITTER = IS_LANDSCAPE ? 32 : 70;
      const ROCK_TOOTH_DEPTH = IS_LANDSCAPE ? 52 : 96;
      const GAME_VERSION = "0.0.1";
      const RECORD_KEY = "sonarDashRecordMeters";

      class SonarDash extends Phaser.Scene {
        constructor() {
          super("SonarDash");
        }

        init() {
          this.isGameOver = false;
          this.distance = 0;
          this.nextChunkX = 0;
          this.nextMineX = 0;
          this.nextWhaleX = 0;
          this.isThrusting = false;
          this.ripples = [];
          this.landChunks = [];
          this.mines = [];
          this.whales = [];
          this.restartRequested = false;
          this.record = this.loadRecord();
        }

        preload() {}

        create() {
          this.cameras.main.setBackgroundColor("#000000");
          this.add.rectangle(0, 0, WORLD_WIDTH, WORLD_HEIGHT, 0x000000, 1)
            .setOrigin(0)
            .setDepth(-1000);
          this.physics.resume();
          this.physics.world.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
          this.physics.world.gravity.y = GRAVITY;

          this.landLayer = this.add.layer();
          this.mineLayer = this.add.layer();
          this.sonarLayer = this.add.layer();
          this.uiLayer = this.add.layer();

          this.createPlayer();
          this.createUi();
          this.input.on("pointerdown", this.handlePointer, this);
          this.input.on("pointerup", this.stopThrust, this);
          this.input.on("pointerout", this.stopThrust, this);

          this.nextChunkX = WORLD_WIDTH + 170;
          while (this.nextChunkX < WORLD_WIDTH + CHUNK_WIDTH * 2) {
            this.spawnRockFormation();
          }

          this.nextMineX = WORLD_WIDTH + 360;
          for (let i = 0; i < 3; i += 1) {
            this.spawnMine();
          }

          this.nextWhaleX = WORLD_WIDTH + (IS_LANDSCAPE ? 1040 : 900);
          this.spawnWhale();

          this.emitSonar();
        }

        loadRecord() {
          const stored = Number.parseInt(localStorage.getItem(RECORD_KEY) || "0", 10);
          return Number.isFinite(stored) ? stored : 0;
        }

        saveRecord(distance) {
          const meters = Math.floor(distance);
          if (meters <= this.record) return false;
          this.record = meters;
          localStorage.setItem(RECORD_KEY, String(meters));
          return true;
        }

        createPlayer() {
          if (!this.textures.exists("submarine")) {
            const g = this.add.graphics();
            const outline = 0x19f6ff;
            const glow = 0x7dfcff;
            const green = 0xbaff7a;
            const hull = 0x123747;
            const dark = 0x071923;
            const mid = 0x1b4a5b;

            g.fillStyle(0x020a0d, 0.35);
            g.fillEllipse(94, 38, 158, 34);

            g.fillStyle(hull, 1);
            g.lineStyle(2, outline, 0.95);
            g.fillRoundedRect(34, 24, 126, 28, 14);
            g.strokeRoundedRect(34, 24, 126, 28, 14);

            g.fillStyle(mid, 0.82);
            g.fillRoundedRect(48, 29, 86, 12, 6);
            g.lineStyle(1, glow, 0.28);
            g.strokeRoundedRect(48, 29, 86, 12, 6);

            g.fillStyle(0x1f5668, 1);
            g.lineStyle(1, outline, 0.82);
            g.fillRoundedRect(88, 12, 34, 14, 4);
            g.strokeRoundedRect(88, 12, 34, 14, 4);
            g.fillStyle(0x113241, 1);
            g.fillRect(95, 8, 18, 5);
            g.lineStyle(1, glow, 0.55);
            g.beginPath();
            g.moveTo(93, 18);
            g.lineTo(119, 18);
            g.moveTo(98, 13);
            g.lineTo(98, 8);
            g.moveTo(108, 13);
            g.lineTo(108, 8);
            g.strokePath();

            g.fillStyle(dark, 1);
            g.lineStyle(1, outline, 0.86);
            g.beginPath();
            g.moveTo(35, 28);
            g.lineTo(10, 19);
            g.lineTo(17, 38);
            g.lineTo(10, 57);
            g.lineTo(35, 48);
            g.closePath();
            g.fillPath();
            g.strokePath();

            g.fillStyle(0x1a4c5e, 1);
            g.lineStyle(1, outline, 0.72);
            g.beginPath();
            g.moveTo(18, 27);
            g.lineTo(18, 8);
            g.lineTo(31, 25);
            g.closePath();
            g.fillPath();
            g.strokePath();
            g.beginPath();
            g.moveTo(18, 49);
            g.lineTo(18, 68);
            g.lineTo(31, 51);
            g.closePath();
            g.fillPath();
            g.strokePath();

            g.fillStyle(0x031015, 1);
            g.lineStyle(1, green, 0.72);
            g.fillCircle(8, 38, 4);
            g.strokeCircle(8, 38, 4);
            g.beginPath();
            g.moveTo(2, 38);
            g.lineTo(14, 38);
            g.moveTo(8, 32);
            g.lineTo(8, 44);
            g.strokePath();

            [62, 80, 98].forEach((x) => {
              g.fillStyle(0x06141a, 1);
              g.fillCircle(x, 38, 3.2);
              g.lineStyle(1, glow, 0.68);
              g.strokeCircle(x, 38, 3.2);
            });
            g.fillStyle(green, 0.78);
            g.fillCircle(137, 49, 2.2);

            g.lineStyle(1, glow, 0.25);
            g.beginPath();
            g.moveTo(47, 47);
            g.lineTo(138, 47);
            g.moveTo(47, 28);
            g.lineTo(138, 28);
            g.strokePath();

            g.generateTexture("submarine", 170, 76);
            g.destroy();
          }

          this.player = this.add.image(PLAYER_X, WORLD_HEIGHT * 0.44, "submarine");
          this.player.setScale(0.82);
          this.physics.add.existing(this.player);
          this.player.body.setSize(96, 24);
          this.player.body.setOffset(29, 26);
          this.player.body.setAllowRotation(false);
          this.player.body.setCollideWorldBounds(false);
          this.player.body.setDragY(260);
          this.player.body.setMaxVelocity(0, 330);
        }

        createUi() {
          this.scoreText = this.add.text(18, 18, "0 m", {
            color: "#baff7a",
            fontSize: "24px",
            fontStyle: "700",
            stroke: "#001214",
            strokeThickness: 4
          }).setScrollFactor(0);

          this.recordText = this.add.text(WORLD_WIDTH - 18, 18, `Best ${this.record} m`, {
            color: "#7dfcff",
            fontSize: "18px",
            fontStyle: "700",
            stroke: "#001214",
            strokeThickness: 4
          }).setOrigin(1, 0).setScrollFactor(0);

          this.versionText = this.add.text(WORLD_WIDTH - 14, WORLD_HEIGHT - 12, `v${GAME_VERSION}`, {
            color: "#426c70",
            fontSize: "12px",
            fontStyle: "700"
          }).setOrigin(1, 1).setAlpha(0.8).setScrollFactor(0);

          this.hintText = this.add.text(WORLD_WIDTH / 2, WORLD_HEIGHT - 72, "Hold to rise", {
            color: "#7dfcff",
            fontSize: "18px",
            fontStyle: "700"
          }).setOrigin(0.5).setAlpha(0.82);

          this.uiLayer.add([this.scoreText, this.recordText, this.versionText, this.hintText]);
        }

        handlePointer() {
          if (this.isGameOver) {
            this.restartGame();
            return;
          }

          this.isThrusting = true;
          this.player.body.setVelocityY(Phaser.Math.Clamp(this.player.body.velocity.y + THRUST_PULSE, -235, 120));
          this.tweens.add({
            targets: this.player,
            scaleY: 0.96,
            scaleX: 1.04,
            duration: 120,
            yoyo: true,
            ease: "Sine.easeInOut"
          });
          this.emitSonar();
          this.hintText.setVisible(false);
        }

        stopThrust() {
          this.isThrusting = false;
        }

        restartGame() {
          if (this.restartRequested) return;
          this.restartRequested = true;
          this.isThrusting = false;
          this.input.enabled = false;
          this.physics.resume();
          this.time.delayedCall(30, () => this.scene.restart());
        }

        emitSonar() {
          const wave = this.add.container(this.player.x, this.player.y);
          wave.birth = this.time.now;
          wave.pulseX = this.player.x;
          wave.pulseY = this.player.y;
          wave.radiusNow = 8;
          wave.dots = [];

          const addDot = (angle, factor, color, alpha, size) => {
            const dot = this.add.circle(0, 0, size, color, alpha);
            wave.add(dot);
            wave.dots.push({ dot, angle, factor });
          };

          [-0.56, -0.38, -0.2, 0, 0.2, 0.38, 0.56].forEach((angle) => {
            addDot(angle, 1, 0x7dfcff, 0.92, 2.2);
          });
          [-0.34, -0.12, 0.12, 0.34].forEach((angle) => {
            addDot(angle, 0.72, 0xbaff7a, 0.45, 1.5);
          });

          this.updateSonarDots(wave);
          this.sonarLayer.add(wave);
          this.ripples.push(wave);

          this.tweens.add({
            targets: wave,
            alpha: 0,
            duration: 1280,
            ease: "Quad.easeOut"
          });
        }

        updateSonarDots(wave) {
          wave.dots.forEach(({ dot, angle, factor }) => {
            const radius = wave.radiusNow * factor;
            dot.setPosition(Math.cos(angle) * radius, Math.sin(angle) * radius);
          });
        }

        spawnRockFormation() {
          const x = this.nextChunkX;
          const width = Phaser.Math.Between(92, 164);
          const skip = Phaser.Math.FloatBetween(0, 1) < 0.26;
          if (!skip) {
            const top = Phaser.Math.FloatBetween(0, 1) < 0.5;
            const depth = Phaser.Math.Between(ROCK_MIN_DEPTH, ROCK_MAX_DEPTH);
            const teeth = Phaser.Math.Between(3, 5);
            const points = [];

            if (top) {
              points.push({ x, y: 0 }, { x: x + width, y: 0 });
              for (let i = teeth; i >= 0; i -= 1) {
                const px = x + (width * i) / teeth;
                const edge = depth + Phaser.Math.Between(-ROCK_EDGE_JITTER, Math.floor(ROCK_EDGE_JITTER * 0.6));
                const tooth = i % 2 === 0 ? edge + Phaser.Math.Between(24, ROCK_TOOTH_DEPTH) : edge;
                points.push({ x: px, y: Phaser.Math.Clamp(tooth, 42, WORLD_HEIGHT - 120) });
              }
              this.createLandPolygon(points, "top");
            } else {
              points.push({ x, y: WORLD_HEIGHT }, { x: x + width, y: WORLD_HEIGHT });
              for (let i = teeth; i >= 0; i -= 1) {
                const px = x + (width * i) / teeth;
                const edge = WORLD_HEIGHT - depth + Phaser.Math.Between(-Math.floor(ROCK_EDGE_JITTER * 0.6), ROCK_EDGE_JITTER);
                const tooth = i % 2 === 0 ? edge - Phaser.Math.Between(24, ROCK_TOOTH_DEPTH) : edge;
                points.push({ x: px, y: Phaser.Math.Clamp(tooth, 120, WORLD_HEIGHT - 42) });
              }
              this.createLandPolygon(points, "bottom");
            }
          }

          this.nextChunkX += CHUNK_WIDTH + Phaser.Math.Between(18, 92);
        }

        createLandPolygon(points, kind) {
          const graphics = this.add.graphics();
          graphics.fillStyle(0x0a3027, 1);
          graphics.lineStyle(2, 0x6aff8a, 0.9);
          graphics.beginPath();
          graphics.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i += 1) {
            graphics.lineTo(points[i].x, points[i].y);
          }
          graphics.closePath();
          graphics.fillPath();

          graphics.lineStyle(2, 0x6aff8a, 0.9);
          graphics.beginPath();
          graphics.moveTo(points[2].x, points[2].y);
          for (let i = 3; i < points.length; i += 1) {
            graphics.lineTo(points[i].x, points[i].y);
          }
          graphics.strokePath();

          const minX = Math.min(...points.map((p) => p.x));
          const maxX = Math.max(...points.map((p) => p.x));
          const minY = Math.min(...points.map((p) => p.y));
          const maxY = Math.max(...points.map((p) => p.y));
          this.drawRockTexture(graphics, points, kind, minX, maxX, minY, maxY);
          graphics.setAlpha(0);
          const collider = this.add.zone(minX, minY, maxX - minX, maxY - minY).setOrigin(0);
          this.physics.add.existing(collider, true);
          this.physics.add.collider(this.player, collider, () => this.endGame());

          this.landLayer.add(graphics);
          const chunk = {
            graphics,
            collider,
            points,
            kind,
            revealAt: -FADE_MS,
            centerX: (minX + maxX) * 0.5,
            centerY: (minY + maxY) * 0.5,
            radius: Phaser.Math.Distance.Between(minX, minY, maxX, maxY) * 0.5
          };
          this.landChunks.push(chunk);
        }

        drawRockTexture(graphics, points, kind, minX, maxX, minY, maxY) {
          graphics.lineStyle(1, 0x144b41, 0.58);
          const edgePoints = points.slice(2);
          edgePoints.forEach((point, index) => {
            const lean = index % 2 === 0 ? 10 : -8;
            graphics.beginPath();
            graphics.moveTo(point.x, point.y);
            graphics.lineTo(point.x + lean, kind === "top" ? Math.max(0, point.y - Phaser.Math.Between(28, 74)) : Math.min(WORLD_HEIGHT, point.y + Phaser.Math.Between(28, 74)));
            graphics.strokePath();
          });

          graphics.fillStyle(0x6aff8a, 0.16);
          for (let i = 0; i < 12; i += 1) {
            const x = Phaser.Math.Between(Math.ceil(minX), Math.floor(maxX));
            const y = Phaser.Math.Between(Math.ceil(minY), Math.floor(maxY));
            graphics.fillCircle(x, y, Phaser.Math.FloatBetween(0.7, 1.8));
          }
        }

        spawnMine() {
          const radius = Phaser.Math.Between(15, 22);
          const x = this.nextMineX;
          const margin = IS_LANDSCAPE ? 76 : 150;
          const y = Phaser.Math.Between(margin, WORLD_HEIGHT - margin);
          const mine = this.add.container(x, y);
          const body = this.add.circle(0, 0, radius, 0x13302a, 1)
            .setStrokeStyle(2, 0xbaff7a, 0.95);
          const glow = this.add.circle(0, 0, radius + 7, 0x7dfcff, 0.08);

          for (let i = 0; i < 8; i += 1) {
            const angle = (Math.PI * 2 * i) / 8;
            const sx = Math.cos(angle) * (radius + 2);
            const sy = Math.sin(angle) * (radius + 2);
            mine.add(this.add.circle(sx, sy, 3, 0xbaff7a, 0.98));
          }

          const inner = this.add.circle(0, 0, Math.max(5, radius - 8))
            .setStrokeStyle(1, 0x7dfcff, 0.5);
          const seam = this.add.graphics();
          seam.lineStyle(1, 0xbaff7a, 0.55);
          seam.beginPath();
          seam.moveTo(-radius + 4, 0);
          seam.lineTo(radius - 4, 0);
          seam.moveTo(0, -radius + 4);
          seam.lineTo(0, radius - 4);
          seam.strokePath();

          mine.add([glow, body, inner, seam]);
          mine.setAlpha(0);
          mine.revealAt = -FADE_MS;
          mine.radius = radius + 11;
          this.mineLayer.add(mine);

          this.physics.add.existing(mine);
          mine.body.setCircle(radius);
          mine.body.setOffset(-radius, -radius);
          mine.body.setAllowGravity(false);
          mine.body.setImmovable(true);
          this.physics.add.overlap(this.player, mine, () => this.endGame());

          this.mines.push(mine);
          this.nextMineX += MINE_SPACING + Phaser.Math.Between(-70, 150);
        }

        spawnWhale() {
          const x = this.nextWhaleX;
          const whaleMargin = IS_LANDSCAPE ? 104 : 190;
          const y = Phaser.Math.Between(whaleMargin, WORLD_HEIGHT - whaleMargin);
          const whale = this.add.container(x, y);
          const body = this.add.ellipse(0, 0, 132, 44, 0x071b24, 1)
            .setStrokeStyle(2, 0x7dfcff, 0.95);
          const head = this.add.ellipse(42, -2, 54, 38, 0x092431, 1)
            .setStrokeStyle(1, 0x7dfcff, 0.8);
          const tailTop = this.add.triangle(-72, -7, 0, 0, -34, -27, -28, -3, 0x071b24, 1)
            .setStrokeStyle(1, 0x7dfcff, 0.8);
          const tailBottom = this.add.triangle(-72, 7, 0, 0, -34, 27, -28, 3, 0x071b24, 1)
            .setStrokeStyle(1, 0x7dfcff, 0.8);
          const fin = this.add.triangle(-8, 14, 0, 0, 34, 8, 5, 25, 0x0b3540, 1)
            .setStrokeStyle(1, 0xbaff7a, 0.75);
          const eye = this.add.circle(60, -7, 3, 0xbaff7a, 1);
          const glow = this.add.ellipse(0, 0, 154, 62, 0x7dfcff, 0.06);
          const skin = this.add.graphics();
          skin.lineStyle(1, 0x7dfcff, 0.24);
          [-34, -12, 10, 32].forEach((x, i) => {
            skin.beginPath();
            skin.moveTo(x, -17 + i % 2);
            skin.lineTo(x + 16, 15 - i % 2);
            skin.strokePath();
          });
          skin.lineStyle(1, 0xbaff7a, 0.22);
          skin.beginPath();
          skin.moveTo(-48, 10);
          skin.lineTo(44, 13);
          skin.strokePath();

          whale.add([glow, tailTop, tailBottom, body, head, fin, skin, eye]);
          whale.setAlpha(0);
          whale.revealAt = -FADE_MS;
          whale.radius = 88;
          whale.baseY = y;
          whale.phase = Phaser.Math.FloatBetween(0, Math.PI * 2);
          whale.sway = Phaser.Math.Between(18, 34);
          this.mineLayer.add(whale);

          this.physics.add.existing(whale);
          whale.body.setSize(118, 38);
          whale.body.setOffset(-59, -19);
          whale.body.setAllowGravity(false);
          whale.body.setImmovable(true);
          this.physics.add.overlap(this.player, whale, () => this.endGame());

          this.whales.push(whale);
          this.nextWhaleX += WHALE_SPACING + Phaser.Math.Between(0, IS_LANDSCAPE ? 360 : 260);
        }

        hasActiveWhaleZone() {
          return this.whales.some((whale) => whale.x > -180 && whale.x < WORLD_WIDTH + 520);
        }

        update(_, delta) {
          if (this.isGameOver) return;

          const dt = delta / 1000;
          const dx = SCROLL_SPEED * dt;
          this.distance += dx * 0.18;
          this.scoreText.setText(`${Math.floor(this.distance)} m`);
          if (this.distance > this.record) {
            this.recordText.setText(`Best ${Math.floor(this.distance)} m`);
          }

          if (this.isThrusting) {
            this.player.body.velocity.y += THRUST * dt;
          }

          this.player.body.velocity.y = Phaser.Math.Clamp(this.player.body.velocity.y, -265, 315);
          this.player.rotation = Phaser.Math.Clamp(this.player.body.velocity.y / 950, -0.22, 0.36);
          if (this.player.y < 42) {
            this.player.y = 42;
            this.player.body.setVelocityY(80);
          } else if (this.player.y > WORLD_HEIGHT - 42) {
            this.player.y = WORLD_HEIGHT - 42;
            this.player.body.setVelocityY(-80);
          }

          this.scrollWorld(dx);
          this.updateRipples(delta);
          this.updateReveals();
        }

        scrollWorld(dx) {
          this.nextChunkX -= dx;
          this.landChunks.forEach((chunk) => {
            chunk.graphics.x -= dx;
            chunk.collider.x -= dx;
            chunk.collider.body.updateFromGameObject();
            chunk.centerX -= dx;
          });

          while (this.landChunks.length && this.landChunks[0].centerX < -CHUNK_WIDTH) {
            const stale = this.landChunks.shift();
            stale.graphics.destroy();
            stale.collider.destroy();
          }

          while (this.nextChunkX < WORLD_WIDTH + CHUNK_WIDTH * 2) {
            this.spawnRockFormation();
          }

          this.nextMineX -= dx;
          this.mines.forEach((mine) => {
            mine.x -= dx;
          });

          while (this.mines.length && this.mines[0].x < -80) {
            this.mines.shift().destroy();
          }

          while (this.nextMineX < WORLD_WIDTH + 360) {
            this.spawnMine();
          }

          this.nextWhaleX -= dx;
          this.whales.forEach((whale) => {
            whale.x -= dx;
            whale.phase += 0.012;
            whale.y = whale.baseY + Math.sin(whale.phase) * whale.sway;
            whale.body.updateFromGameObject();
          });

          while (this.whales.length && this.whales[0].x < -140) {
            this.whales.shift().destroy();
          }

          while (this.nextWhaleX < WORLD_WIDTH + 700 && !this.hasActiveWhaleZone()) {
            this.spawnWhale();
          }
        }

        updateRipples(delta) {
          for (let i = this.ripples.length - 1; i >= 0; i -= 1) {
            const ring = this.ripples[i];
            ring.x -= SCROLL_SPEED * (delta / 1000);
            ring.pulseX = ring.x;
            const age = this.time.now - ring.birth;
            const radius = 8 + (age / 1000) * SONAR_SPEED;
            ring.radiusNow = radius;
            this.updateSonarDots(ring);

            if (radius > SONAR_MAX_RADIUS || ring.alpha <= 0.02) {
              ring.destroy();
              this.ripples.splice(i, 1);
              continue;
            }

            this.revealTouchedBy(ring);
          }
        }

        revealTouchedBy(ring) {
          const now = this.time.now;
          this.landChunks.forEach((chunk) => {
            const d = Phaser.Math.Distance.Between(ring.pulseX, ring.pulseY, chunk.centerX, chunk.centerY);
            if (Math.abs(d - ring.radiusNow) < chunk.radius + SONAR_BAND) {
              chunk.revealAt = now;
            }
          });

          this.mines.forEach((mine) => {
            const d = Phaser.Math.Distance.Between(ring.pulseX, ring.pulseY, mine.x, mine.y);
            if (Math.abs(d - ring.radiusNow) < mine.radius + SONAR_BAND) {
              mine.revealAt = now;
            }
          });

          this.whales.forEach((whale) => {
            const d = Phaser.Math.Distance.Between(ring.pulseX, ring.pulseY, whale.x, whale.y);
            if (Math.abs(d - ring.radiusNow) < whale.radius + SONAR_BAND) {
              whale.revealAt = now;
            }
          });
        }

        updateReveals() {
          const now = this.time.now;
          this.landChunks.forEach((chunk) => {
            const age = now - chunk.revealAt;
            const alpha = Phaser.Math.Clamp(1 - age / FADE_MS, 0, 0.92);
            chunk.graphics.setAlpha(alpha);
          });

          this.mines.forEach((mine) => {
            const age = now - mine.revealAt;
            const alpha = Phaser.Math.Clamp(1 - age / FADE_MS, 0, 1);
            mine.setAlpha(alpha);
          });

          this.whales.forEach((whale) => {
            const age = now - whale.revealAt;
            const alpha = Phaser.Math.Clamp(1 - age / FADE_MS, 0, 0.94);
            whale.setAlpha(alpha);
          });
        }

        endGame() {
          if (this.isGameOver) return;
          this.isGameOver = true;
          const newRecord = this.saveRecord(this.distance);
          if (this.recordText) {
            this.recordText.setText(`Best ${this.record} m`);
          }
          this.physics.pause();
          this.player.setTint(0xff4665);
          this.player.rotation = 0.2;

          const veil = this.add.rectangle(0, 0, WORLD_WIDTH, WORLD_HEIGHT, 0x000000, 0.72).setOrigin(0);
          const title = this.add.text(WORLD_WIDTH / 2, WORLD_HEIGHT * 0.36, "Game Over", {
            color: "#7dfcff",
            fontSize: "44px",
            fontStyle: "900",
            stroke: "#001214",
            strokeThickness: 6
          }).setOrigin(0.5);
          const score = this.add.text(WORLD_WIDTH / 2, WORLD_HEIGHT * 0.45, newRecord ? `${Math.floor(this.distance)} m  NEW BEST` : `${Math.floor(this.distance)} m`, {
            color: newRecord ? "#7dfcff" : "#baff7a",
            fontSize: newRecord ? "24px" : "30px",
            fontStyle: "800"
          }).setOrigin(0.5);
          const button = this.add.rectangle(WORLD_WIDTH / 2, WORLD_HEIGHT * 0.56, 210, 54, 0x092d32, 1)
            .setStrokeStyle(2, 0x7dfcff, 1)
            .setInteractive({ useHandCursor: true });
          const restart = this.add.text(WORLD_WIDTH / 2, WORLD_HEIGHT * 0.56, "Tap to Restart", {
            color: "#eaffff",
            fontSize: "20px",
            fontStyle: "800"
          }).setOrigin(0.5);
          button.on("pointerdown", () => this.restartGame());
          restart.setInteractive({ useHandCursor: true });
          restart.on("pointerdown", () => this.restartGame());

          this.uiLayer.add([veil, title, score, button, restart]);
        }
      }

      const game = new Phaser.Game({
        type: Phaser.AUTO,
        parent: "game",
        backgroundColor: "#000000",
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
          width: WORLD_WIDTH,
          height: WORLD_HEIGHT
        },
        physics: {
          default: "arcade",
          arcade: {
            gravity: { y: GRAVITY },
            debug: false
          }
        },
        render: {
          antialias: true,
          pixelArt: false,
          clearBeforeRender: true
        },
        scene: SonarDash
      });

      let lastLandscape = IS_LANDSCAPE;
      window.addEventListener("resize", () => {
        const nextLandscape = window.innerWidth >= window.innerHeight;
        if (nextLandscape !== lastLandscape) {
          window.location.reload();
          return;
        }
        game.scale.refresh();
      });

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }
    })();
  </script>
</body>
</html>
